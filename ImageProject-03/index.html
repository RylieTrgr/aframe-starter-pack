<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="aurora" src="assets/aurora.jpg">
        <a-asset-item id="flake-1" src="assets/snowflake-1.obj"></a-asset-item>
        <a-asset-item id="flake-2" src="assets/snowflake-2.obj"></a-asset-item>
        

      </a-assets>

      <a-obj-model scale=".02 .02 .02" position="-1 1.5 -3" rotation= "40 -45 0" color="#eeaff5" src="#flake-1"></a-obj-model>

      <a-obj-model scale=".04 .04 .04" position="1 2.5 -4" rotation= "40 -45 0" color="#aff5e4" src="#flake-2"></a-obj-model>

      <a-sky src="#aurora"></a-sky>
    </a-scene>
  </body>
</html>
