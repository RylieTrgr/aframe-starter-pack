<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>

      <a-assets>
        <img id="sky" src="assets/sunsetbox.jpg">
        <img id="ball" src="assets/ball.png">
        <img id="cone" src="assets/cone.jpg">
        <img id="icecream" src="assets/ice cream.jpg">
      </a-assets>


      <a-sphere position="0 1.25 -5" radius="1.25" src="#ball"></a-sphere>
      <a-sphere position="1 2.25 -3" radius="1.25" src="#icecream"></a-sphere>
      <a-cone position="1 0.75 -3" radius="0.5" height="1.5" src="#cone" rotation=" 180 0 0"></a-cone>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#f4e7aa"></a-plane>
      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>
</html>
